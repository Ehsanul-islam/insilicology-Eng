<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">RMSD analysis plot example</title>
  <desc id="desc">A stylized molecular dynamics RMSD line plot.</desc>
  <rect width="900" height="520" fill="#0f172a"/>
  <rect x="72" y="54" width="760" height="382" rx="24" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="96" y="98" fill="#f8fafc" font-family="Arial, sans-serif" font-size="30" font-weight="700">RMSD Stability Profile</text>
  <text x="96" y="130" fill="#94a3b8" font-family="Arial, sans-serif" font-size="18">Backbone deviation across simulation time</text>
  <line x1="132" y1="372" x2="776" y2="372" stroke="#64748b" stroke-width="2"/>
  <line x1="132" y1="168" x2="132" y2="372" stroke="#64748b" stroke-width="2"/>
  <path d="M132 336 C190 280 244 303 298 254 C352 206 410 226 456 220 C522 211 568 194 624 198 C688 203 724 184 776 176" fill="none" stroke="#a855f7" stroke-width="7" stroke-linecap="round"/>
  <path d="M132 336 C190 280 244 303 298 254 C352 206 410 226 456 220 C522 211 568 194 624 198 C688 203 724 184 776 176" fill="none" stroke="#22d3ee" stroke-width="3" stroke-linecap="round"/>
  <text x="404" y="420" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="16">Time (ns)</text>
  <text x="54" y="276" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="16" transform="rotate(-90 54 276)">RMSD (nm)</text>
  <circle cx="776" cy="176" r="9" fill="#22d3ee"/>
</svg>
