  <path d="M132 340 L166 326 L200 346 L234 296 L268 334 L302 246 L336 312 L370 330 L404 214 L438 288 L472 324 L506 306 L540 256 L574 338 L608 326 L642 198 L676 302 L710 322 L744 286 L776 318" fill="none" stroke="#f59e0b" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
