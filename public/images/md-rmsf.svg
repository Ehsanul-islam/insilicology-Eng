  <rect x="72" y="54" width="760" height="382" rx="24" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <text x="96" y="98" fill="#f8fafc" font-family="Arial, sans-serif" font-size="30" font-weight="700">RMSF Residue Flexibility</text>
