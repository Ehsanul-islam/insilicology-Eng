<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">SASA analysis plot example</title>
  <desc id="desc">A stylized solvent accessible surface area plot.</desc>
  <rect width="900" height="520" fill="#0f172a"/>
  <rect x="72" y="54" width="760" height="382" rx="24" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="96" y="98" fill="#f8fafc" font-family="Arial, sans-serif" font-size="30" font-weight="700">SASA Exposure Trend</text>
  <text x="96" y="130" fill="#94a3b8" font-family="Arial, sans-serif" font-size="18">Solvent-accessible surface area over time</text>
  <line x1="132" y1="372" x2="776" y2="372" stroke="#64748b" stroke-width="2"/>
  <line x1="132" y1="168" x2="132" y2="372" stroke="#64748b" stroke-width="2"/>
  <path d="M132 250 C182 236 226 280 276 266 C326 252 360 204 414 226 C466 248 520 258 570 232 C626 202 686 226 728 214 C752 208 768 206 776 206 L776 372 L132 372 Z" fill="#14b8a6" opacity="0.25"/>
  <path d="M132 250 C182 236 226 280 276 266 C326 252 360 204 414 226 C466 248 520 258 570 232 C626 202 686 226 728 214 C752 208 768 206 776 206" fill="none" stroke="#2dd4bf" stroke-width="7" stroke-linecap="round"/>
  <path d="M132 250 C182 236 226 280 276 266 C326 252 360 204 414 226 C466 248 520 258 570 232 C626 202 686 226 728 214 C752 208 768 206 776 206" fill="none" stroke="#99f6e4" stroke-width="3" stroke-linecap="round"/>
  <text x="404" y="420" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="16">Time (ns)</text>
  <text x="54" y="286" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="16" transform="rotate(-90 54 286)">SASA</text>
  <circle cx="776" cy="206" r="9" fill="#99f6e4"/>
</svg>
